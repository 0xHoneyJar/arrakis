# Pipeline Self-Review capability manifest
# Reviews changes to pipeline scripts and skills for self-consistency
# Source: cycle-046 addition, formalized in cycle-047 Sprint 388

capability:
  id: pipeline-self-review
  type: review
  version: 1
  description: >-
    Reviews changes to the pipeline itself (.claude/scripts/, .claude/skills/,
    .claude/data/, .claude/protocols/) against governing SDDs. Addresses the
    insight that pipeline bugs have multiplicative impact — the review
    infrastructure should examine itself with the same rigor it examines
    application code.

  trigger:
    files:
      - ".claude/scripts/**"
      - ".claude/skills/**"
      - ".claude/data/**"
      - ".claude/protocols/**"
    tags:
      - pipeline
      - infrastructure
      - self-review

  input:
    requires:
      - sdd
      - diff
    optional:
      - prior_findings

  output:
    format: findings-json
    severity_range: [0, 1000]

  budget:
    min_tokens: 4000
    optimal_tokens: 50000
    max_tokens: 150000

  dependencies:
    before:
      - red-team-code
      - bridgebuilder-review
    after: []
